# /opt/etc/mihomo/te-vpn.conf — settings for te-vpn (marking + transparent proxy).

# Selection mark for devices listed in $DEVICES. Keenetic policy devices use
# their firmware mark instead; both are then delivered to mihomo.
MARK=0x6d69

# mihomo transparent proxy listeners and the fwmark used for local UDP delivery.
# redir-port/tproxy-port in config.yaml must match REDIR_PORT/TPROXY_PORT.
REDIR_PORT=7892
TPROXY_PORT=7895
TPROXY_MARK=0x1

# Drop QUIC/HTTP3 for VPN-selected devices so browsers/apps fall back to TCP.
# QUIC is fine, but UDP relay through router -> mihomo -> VLESS is often less
# stable than TCP; YouTube/Chromium fall back to HTTP/2 over TCP cleanly.
# Set BLOCK_QUIC=0 if your selected server is known to relay UDP/443 reliably.
BLOCK_QUIC=1

# Drop stale conntrack entries for VPN-selected devices when te-vpn changes or
# re-applies transparent proxy rules. This avoids old NAT/REDIRECT decisions
# surviving a WAN reconnect, firewall rebuild or server switch. The interval
# debounces repeated NDM mangle/nat hook calls.
CONNTRACK_FLUSH=1
CONNTRACK_FLUSH_INTERVAL=20

# Keenetic access policy whose member devices ALSO go through the VPN.
# Assign devices to it in the web UI; te-vpn looks up the policy's connmark
# by this name (via ndmc) and routes it too. Works alongside $DEVICES.
# Set empty to disable. install.sh creates the policy if missing.
POLICY_NAME=te-vpn

# local-delivery routing table and ip-rule priority
# 99 = before Keenetic's own policy rules at priority 100.
TABLE=1000
PRIO=99

# Old TUN device name, kept only so te-vpn can remove stale TUN-era rules.
TUN=mihomo0

# devices that go through the VPN: one MAC or IP[/CIDR] per line, '#' comments.
# Manage with:  te-vpn add <mac|ip>  /  te-vpn remove <mac|ip>  /  te-vpn devices
DEVICES=/opt/etc/mihomo/devices.list
