# /opt/etc/mihomo/te-vpn.conf — settings for te-vpn (marking + policy routing).

# fwmark for VPN-bound traffic. te-vpn's own iptables chain marks packets of
# the devices listed in $DEVICES with it — no Keenetic access policy required.
MARK=0x6d69

# Keenetic access policy whose member devices ALSO go through the VPN.
# Assign devices to it in the web UI; te-vpn looks up the policy's connmark
# by this name (via ndmc) and routes it too. Works alongside $DEVICES.
# Set empty to disable. install.sh creates the policy if missing.
POLICY_NAME=te-vpn

# routing table and ip-rule priority (99 = before Keenetic's own rules @100)
TABLE=1000
PRIO=99

# TUN device name (must match tun.device in config.yaml)
TUN=mihomo0

# devices that go through the VPN: one MAC or IP[/CIDR] per line, '#' comments.
# Manage with:  te-vpn add <mac|ip>  /  te-vpn remove <mac|ip>  /  te-vpn devices
DEVICES=/opt/etc/mihomo/devices.list
