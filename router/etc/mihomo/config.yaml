# /opt/etc/mihomo/config.yaml
# Self-contained mihomo VPN for Keenetic (Entware).
# Traffic of devices listed in /opt/etc/mihomo/devices.list is marked by our
# own iptables chain and routed into the mihomo TUN by policy routing
# (see /opt/bin/mihomo-route and /opt/etc/mihomo/vpn.conf).

mixed-port: 7890          # plain HTTP/SOCKS proxy too (optional, handy for tests)
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
ipv6: false

# --- Web admin / API ---------------------------------------------------------
external-controller: 0.0.0.0:9090
external-ui: /opt/share/mihomo/ui
external-ui-name: dashboard
secret: ""                # set a password here to protect the UI/API if exposed

profile:
  store-selected: true    # remember the manually selected server across restarts (#5)
  store-fake-ip: true

# --- TUN (the device our policy-routed traffic enters) -----------------------
tun:
  enable: true
  device: mihomo0
  stack: gvisor           # gvisor = most portable on the 4.9 kernel
  auto-route: false       # we manage routing ourselves (mihomo-route), no full hijack
  auto-redirect: false
  auto-detect-interface: true   # mihomo finds the WAN iface (eth3) for its own egress
  dns-hijack:
    - any:53
  mtu: 1500
  strict-route: false

# --- DNS (used for traffic that enters the TUN) ------------------------------
dns:
  enable: true
  listen: 0.0.0.0:1053    # not 53 — avoid clashing with the router's dnsmasq
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "+.local.netcraze.io"
    - "192.168.1.1"
  default-nameserver:
    - 1.1.1.1
    - 8.8.8.8
  nameserver:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  proxy-server-nameserver:   # resolve the VLESS server hostnames directly
    - https://1.1.1.1/dns-query
    - 8.8.8.8

# --- Subscription ------------------------------------------------------------
# Change the URL with:  te-vpn sub "https://your-new-subscription-url"
# The trailing  #sub  marker is how the `te-vpn` tool finds this line — keep it.
proxy-providers:
  airport:
    type: http
    url: "https://example.invalid/REPLACE_ME"  #sub
    interval: 86400
    path: ./providers/airport.yaml
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300

# --- Server selection groups -------------------------------------------------
proxy-groups:
  # PROXY: pick a specific server manually, or AUTO, or DIRECT (no VPN).
  - name: PROXY
    type: select
    use:
      - airport
    proxies:
      - AUTO
      - DIRECT

  # AUTO: first healthy server from the subscription; DIRECT as last resort.
  # Tolerates an empty/unfetched subscription (always has DIRECT) -> no startup
  # failure and traffic still flows while the sub is being set up.
  - name: AUTO
    type: fallback
    use:
      - airport
    proxies:
      - DIRECT
    url: https://www.gstatic.com/generate_204
    interval: 300

# --- Rules -------------------------------------------------------------------
rules:
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
  - IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
  - IP-CIDR,100.64.0.0/10,DIRECT,no-resolve
  - MATCH,PROXY
