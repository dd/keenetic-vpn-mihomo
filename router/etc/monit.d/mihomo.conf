# /opt/etc/monit.d/mihomo.conf — supervision for the mihomo VPN.
# Restart on crash / dead API, with resource guards for small routers and a
# restart budget to avoid crash loops.

check process mihomo with pidfile /opt/var/run/mihomo.pid
    start program = "/opt/bin/te-vpn up" with timeout 60 seconds
    stop program  = "/opt/bin/te-vpn down" with timeout 30 seconds

    # Crash recovery: restart if the process disappears.
    if does not exist then restart

    # Health: the controller API (port 9090) must accept connections.
    if failed host 127.0.0.1 port 9090 type tcp
        with timeout 10 seconds
        for 3 cycles
    then restart

    # Memory guard (gvisor TUN stack + proxies should stay modest).
    if totalmem > 300 MB for 5 cycles then restart

    # CPU: sustained 90%+ means a hot loop.
    if cpu > 90% for 10 cycles then restart

    # Give up after repeated failures rather than loop forever.
    if 5 restarts within 10 cycles then unmonitor

check file mihomo_bin with path /opt/sbin/mihomo
    if does not exist then unmonitor
